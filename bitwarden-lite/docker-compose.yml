---
services:
  bitwarden:
    depends_on:
      - db
    env_file:
      - settings.env
    image: ${REGISTRY:-ghcr.io/bitwarden}/lite:${TAG:-2026.6.2}
    user: 999:999
    tmpfs: /tmp:rw,noexec,nosuid,nodev,size=512m
    read_only: true
    security_opt:
      - no-new-privileges
    restart: always
    ports:
      - '80:8080'
      - '443:8443'
    volumes:
      # The bind mount below must be owned by the user specified above.
      # Create it with:
      #   mkdir -p ./config && sudo chown 999:999 ./config
      - ./config:/etc/bitwarden
      # Note: named volumes are an alternative that don't work with rootless containers.
      # To run rootless (recommended for security) with named volumes,
      # you must use a rootless docker daemon or podman.
      # - bitwarden:/etc/bitwarden

  # MariaDB Example
  db:
    environment:
      MARIADB_USER: 'bitwarden'
      MARIADB_PASSWORD: 'super_strong_password'
      MARIADB_DATABASE: 'bitwarden_vault'
      MARIADB_RANDOM_ROOT_PASSWORD: 'true'
    image: mariadb:10
    restart: always
    volumes:
      - data:/var/lib/mysql

  # PostgreSQL Example
  # db:
  #   environment:
  #     POSTGRES_USER: "bitwarden"
  #     POSTGRES_PASSWORD: "super_strong_password"
  #     POSTGRES_DB: "bitwarden_vault"
  #   image: postgres:14
  #   restart: always
  #   volumes:
  #     - data:/var/lib/postgresql/data

  # MS SQL Server Example
  # Docs: https://learn.microsoft.com/en-us/sql/linux/sql-server-linux-docker-container-deployment
  # db:
  #   environment:
  #     MSSQL_SA_PASSWORD: "super_strong_password"
  #     ACCEPT_EULA: Y
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   restart: always
  #   volumes:
  #     - data:/var/opt/mssql

volumes:
  # bitwarden:
  data:
