name: Self-host Release Bug Report
description: Report a bug with the Bitwarden self-host installation scripts
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to submit a bug report!

        > [!WARNING]
        > This repository **only tracks issues with the Bitwarden self-host installation scripts**.
        >
        > If your issue is with the Bitwarden application itself (including **Bitwarden Lite**), please report it in **bitwarden/server** instead:
        > https://github.com/bitwarden/server
        >
        > If your issue is with the Bitwarden helm chart, please report it at https://github.com/bitwarden/helm-charts

        Please provide as much detail as possible to help us reproduce and investigate the issue.

  - type: checkboxes
    id: self-host-scripts
    attributes:
      label: Repository Confirmation
      description: Confirm this issue belongs in this repository.
      options:
        - label: I understand this repository only tracks self-host installation scripts. Application issues (including Bitwarden Lite) should be reported in bitwarden/server.
          required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the exact steps required to reproduce the issue.
      placeholder: |
        1. Configure...
        2. Run...
        3. Execute...
        4. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Which environment are you using?
      options:
        - Self-Hosted
        - Lite
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Image tag
      description: |
        Specify the version or Docker image tag you are running.
        Example: 2026.6.0 or bitwarden/self-host:2026.6.0
      placeholder: 2026.6.0
    validations:
      required: true

  - type: textarea
    id: environment-details
    attributes:
      label: Environment details
      description: |
        If applicable, provide details about your deployment.
      placeholder: |
        - OS (Mac, Windows, Linux)
        - OS version
        
  - type: textarea
    id: diagnostics
    attributes:
      label: Logs, screenshots and configuration
      description: |
        Optional but strongly encouraged.

        Please include any relevant:
        - Logs
        - Screenshots
        - Error messages
        - Redacted configuration (for example: settings.env)
        - Docker Compose file(s)

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add anything else that may help us investigate the issue.

  - type: checkboxes
    id: issue-tracking-info
    attributes:
      label: Issue Tracking Information
      description: |
        Bitwarden tracks engineering work internally.
      options:
        - label: I understand that work is tracked outside GitHub. Pull requests may be linked to this issue, but Bitwarden does not use GitHub Assignments, Milestones, or Projects to track progress.